# CI/CD — build the Flask app and deploy to Azure App Service on every push to main.
# Based on Microsoft's official python-webapp-on-azure template.
#
# BEFORE THIS WORKS, do two things (see the Build Guide):
#   1. In GitHub repo → Settings → Secrets and variables → Actions → New secret
#      Name:  AZURE_WEBAPP_PUBLISH_PROFILE
#      Value: paste the *entire* publish profile you downloaded from the App Service.
#   2. Change APP_NAME below to your real App Service name.

name: Build and deploy Python app to Azure App Service

on:
  push:
    branches: [ main ]
  workflow_dispatch:        # lets you run it manually from the Actions tab

env:
  APP_NAME: harish-webapp-project2   # <-- change to YOUR App Service name
  PYTHON_VERSION: '3.12'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Zip artifact for deployment
        run: zip -r release.zip ./* -x "venv/*"

      - name: Upload artifact for deploy job
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact
        run: unzip release.zip

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          startup-command: 'gunicorn --bind=0.0.0.0 --timeout 600 app:app'
